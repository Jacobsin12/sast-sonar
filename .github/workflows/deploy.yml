name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Forzamos el nombre a minúsculas para que Docker lo acepte
  IMAGE_NAME: jacobsin12/sast-sonar

jobs:
  # 1. ETAPA: Análisis de Calidad (SonarQube)
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecución de SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.

  # 2. ETAPA: Prueba de Rendimiento (K6)
  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Ejecución de k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  # 3. ETAPA: Empaquetado (Docker)
  build-and-push:
    name: Empaquetado en Docker y GHCR
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

  # 4. ETAPA: Despliegue Automático (CD)
  deploy:
    name: Despliegue en Servidor Cloud
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login en el registro desde el servidor para descargar la imagen privada
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Detener contenedores anteriores para evitar conflictos
            docker stop my-node-app || true
            docker rm my-node-app || true
            
            # Limpiar imágenes viejas
            docker image prune -f
            
            # Descargar la nueva versión
            docker pull ghcr.io/jacobsin12/sast-sonar:main
            
            # Ejecutar el contenedor mapeando el puerto 80 del servidor al 3000 de la app
            docker run -d \
              --name my-node-app \
              -p 80:3000 \
              --restart always \
              ghcr.io/jacobsin12/sast-sonar:main
