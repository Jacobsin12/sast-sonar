name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jacobsin12/sast-sonar

jobs:
  # 1. ETAPA: Análisis de Calidad (SonarQube)
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecución de SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.

  # 2. ETAPA: Prueba de Rendimiento (K6)
  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Ejecución de k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  # 3. ETAPA: Empaquetado (Docker)
  build-and-push:
    name: Empaquetado en Docker y GHCR
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 4. ETAPA: Despliegue Automático (Corregido y Optimizado)
  deploy:
    name: Despliegue en Servidor Cloud
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entrar a la carpeta del proyecto
            if [ ! -d "sast-sonar" ]; then
              git clone https://github.com/Jacobsin12/sast-sonar.git
            fi
            cd ~/sast-sonar

            # 2. Sincronizar el CÓDIGO (index.js, views/, docker-compose.yml)
            git fetch origin main
            git reset --hard origin/main

            # 3. Login en el Registro de Imágenes
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 4. Descargar la IMAGEN RECIÉN CONSTRUIDA
            sudo docker pull ghcr.io/jacobsin12/sast-sonar:latest
            
            # 5. REINICIAR TODO EL STACK (Forzando la actualización de la App)
            # El flag --build asegura que lea el index.js nuevo si usas build: .
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # 6. Limpieza de imágenes viejas
            sudo docker image prune -f
