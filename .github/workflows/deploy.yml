name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jacobsin12/sast-sonar

jobs:
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.

  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  build-and-push:
    name: Build Docker Image
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Despliegue Blue/Green
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # PASO 1: ACTUALIZAR LAS APPS EN PRODUCCIÓN
      - name: Desplegar App en Producción
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST_PROD }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/sast-sonar
            git fetch origin main
            git reset --hard origin/main
            
            # Login y Pull
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker pull ghcr.io/jacobsin12/sast-sonar:latest
            
            # Lógica de ambiente (Usando HOME para evitar Permission Denied)
            if [ ! -f ~/.current_deploy.env ]; then echo "ACTIVE_ENV=blue" > ~/.current_deploy.env; fi
            source ~/.current_deploy.env
            
            TARGET_ENV=$([ "$ACTIVE_ENV" = "blue" ] && echo "app-green" || echo "app-blue")
            
            echo "Limpiando y levantando nueva versión en Producción: $TARGET_ENV"
            sudo docker rm -f $TARGET_ENV || true
            sudo docker-compose up -d --no-deps $TARGET_ENV
            
            # Actualizamos el estado en Producción
            NEXT_ACTIVE=$([ "$ACTIVE_ENV" = "blue" ] && echo "green" || echo "blue")
            echo "ACTIVE_ENV=$NEXT_ACTIVE" > ~/.current_deploy.env

      # PASO 2: CAMBIAR EL TRÁFICO EN EL PROXY
      - name: Switch de Tráfico en el Proxy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST_PROXY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/sast-sonar
            git fetch origin main
            git reset --hard origin/main

            # Determinar qué toca activar (Independiente para seguridad)
            if [ ! -f ~/.current_deploy.env ]; then echo "ACTIVE_ENV=blue" > ~/.current_deploy.env; fi
            source ~/.current_deploy.env
            NEXT_ACTIVE=$([ "$ACTIVE_ENV" = "blue" ] && echo "green" || echo "blue")

            echo "Cambiando tráfico en el Proxy a: $NEXT_ACTIVE"
            
            # Asegurar que el contenedor del proxy esté limpio y arriba
            sudo docker rm -f nginx_proxy || true
            sudo docker-compose up -d nginx_proxy
            
            # Ejecutar el switch
            sleep 5
            sudo docker exec nginx_proxy sh /usr/local/bin/switch_env.sh $NEXT_ACTIVE
            sudo docker restart nginx_proxy
            
            # Actualizar persistencia del estado en el Proxy
            echo "ACTIVE_ENV=$NEXT_ACTIVE" > ~/.current_deploy.env
            
            # Verificación final
            echo "--- VERIFICACIÓN ---"
            sudo docker exec nginx_proxy curl -sI localhost | grep -i "X-Deployment-Color" || echo "Header no detectado aún"
            sudo docker image prune -f
            echo "¡Despliegue Blue/Green finalizado con éxito!"