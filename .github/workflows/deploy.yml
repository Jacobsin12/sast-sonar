name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jacobsin12/sast-sonar

jobs:
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.

  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  build-and-push:
    name: Build Docker Image
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Despliegue Blue/Green en Servidor
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/sast-sonar
            git fetch origin main
            git reset --hard origin/main
            
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker pull ghcr.io/jacobsin12/sast-sonar:latest
            
            if [ ! -f current_deploy.env ]; then
              echo "ACTIVE_ENV=blue" > current_deploy.env
            fi
            
            source current_deploy.env
            echo "Entorno activo: $ACTIVE_ENV"
            
            if [ "$ACTIVE_ENV" = "blue" ]; then
              TARGET_ENV="app-green"
              NEXT_ACTIVE="green"
            else
              TARGET_ENV="app-blue"
              NEXT_ACTIVE="blue"
            fi
            
            echo "Desplegando hacia objetivo: $TARGET_ENV"
            
            sudo docker-compose up -d --no-deps $TARGET_ENV
            
            echo "Esperando 5s para inicializar app..."
            sleep 5
            
            export TARGET_ENV=$TARGET_ENV
            envsubst < nginx.conf.template > nginx.conf
            
            sudo docker exec nginx_proxy nginx -s reload
            
            echo "ACTIVE_ENV=$NEXT_ACTIVE" > current_deploy.env
            echo "Tráfico enrutado a: $NEXT_ACTIVE"
            
            sudo docker image prune -f

