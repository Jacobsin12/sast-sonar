version: '3.8'

services:
  app-node:
    build: .
    image: ghcr.io/jacobsin12/sast-sonar:latest
    container_name: app-node
    ports:
      - "3000:3000"
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    ports:
      - "9100:9100"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus # <--- GUARDA EL HISTORIAL DE DATOS
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana # <--- GUARDA TUS DASHBOARDS Y CONEXIONES
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

# --- ESTA PARTE ES LA QUE TE FALTABA PARA QUE NO SE BORRE NADA ---
volumes:
  prometheus_data:
  grafana_data: